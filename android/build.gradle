import groovy.json.JsonSlurper

// Standalone build path (used by CI via `./gradlew :testDebugUnitTest` from
// this `android/` directory). When consumer apps autolink the bridge, this
// buildscript block is evaluated as a subproject too but is a no-op since
// the consumer's root already provides identical or newer classpath
// entries — AGP/Kotlin plugin classes are loaded once and shared.
buildscript {
  repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.7.2'
    classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.0'
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def isNewArchitectureEnabled() {
    return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}

if (isNewArchitectureEnabled()) {
    apply plugin: 'com.facebook.react'
}

def getVersionFromNpm() {
    def inputFile = new File("../package.json")
    def packageJson = new JsonSlurper().parseText(inputFile.text)

    return packageJson["version"]
}

android {
    namespace 'com.dashx.rn.sdk'
    compileSdkVersion 34

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName getVersionFromNpm()

        buildConfigField 'String', 'VERSION_NAME', "\"$versionName\""
    }
    // Align Java + Kotlin target so the standalone CI build (which doesn't
    // inherit RN's defaults) doesn't trip "Inconsistent JVM-target
    // compatibility". Consumers autolinking the bridge already set these
    // at root scope; redeclaring here is a no-op when versions match.
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    lint {
        abortOnError false
    }

    sourceSets {
        main {
            if (isNewArchitectureEnabled()) {
                java.srcDirs += ['src/newarch/java']
            } else {
                java.srcDirs += ['src/oldarch/java']
            }
        }
    }

    packaging {
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libfbjni.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libfbjni.so'
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86/libfbjni.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/x86_64/libfbjni.so'
   }
}

if (isNewArchitectureEnabled()) {
    react {
        jsRootDir = file("../src/")
        libraryName = "RNDashXReactNativeSpec"
        codegenJavaPackageName = "com.dashx.rn.sdk"
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    compileOnly 'com.facebook.react:react-android:+'

    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0'

    // Ensure Firebase Messaging types are available for FCM service subclass
    implementation 'com.google.firebase:firebase-messaging-ktx:23.1.2'

    implementation "com.dashx:dashx-android:1.2.6"

    // Unit tests for `util/Utils.kt` — JVM-only, no Robolectric. The RN
    // `react-android` artifact is pulled in at test runtime (not as a
    // runtime dep) so tests can reach `JavaOnlyMap` / `JavaOnlyArray` —
    // pure-Java `ReadableMap` / `WritableMap` impls that stand in for the
    // JNI-backed `WritableNativeMap` / `WritableNativeArray` in JVM tests.
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'com.facebook.react:react-android:+'
}
